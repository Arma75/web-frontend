                flex-direction: column;
                gap: 8px;
            }
            .kok-input-group[data-layout='horizontal'] {
                display: grid;
                grid-template: auto 1fr / auto 1fr;
                align-items: center;

            .kok-input-group.error .kok-input-field {
                background-color: #fee2e2;

                color: #7f1d1d;
            }
            .kok-input-group.error .kok-input-field-error-msg {

            }
            .kok-input-group .kok-input-field-success-msg {
                color: #14532d;
            }

            .kok-input-group .kok-input-field-error-msg,
            .kok-input-group .kok-input-field-success-msg {
                padding-left: 8px;
                max-height: 0;
                overflow: hidden;
                transition: all 0.3s ease-in-out;
            }

            .kok-input-group[data-layout='horizontal'] .kok-input-field-error-msg,
            .kok-input-group[data-layout='horizontal'] .kok-input-field-success-msg {
                grid-row: 2;
                grid-column: 2;
            }

            /* messages */
            .kok-input-group *[class^='kok-input-field'][class$='msg'] {
                padding-left: 8px;
                max-height: 0;
                overflow: hidden;
                transition: all 0.3s ease-in-out;
            }
            .kok-input-group.danger 

            /* required indicator */
            .kok-input-group[data-required='true'] .kok-input-label {
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }
            .kok-input-group[data-required='true'] .kok-input-label::after {
                content: '*';
                position: relative;
                top: -8px;

                color: #d66363;
                font-size: 0.7rem;
            }
            .kok-input-group[data-required='true'] .kok-input-label[data-required-text]:not([data-required-text=''])::after {

        <!-- scripts-->
        <script>
            const KOK_INPUT_FILTER_TYPES = {
                int: /[0-9]/g,
                float: /[0-9.]/g,
                alpha: /[a-zA-Z]/g,
                lowercase: /[a-z]/g,
                uppercase: /[A-Z]/g,
                korean: /[ㄱ-ㅎㅏ-ㅣ가-힣]/g,
                variable: /[a-zA-Z0-9_]/g,
                email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                date: /^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/, 
                regexp: /^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01]) (0\d|1\d|2[0-3]):([0-5]\d):([0-5]\d)$/, 
            };

            class KokInputDecorator {
                constructor() {
                    this.inputSelector = '.kok-input-field';
                    this.groupSelector = '.kok-input-group';
                }

                init() {
                    document.addEventListener('blur', e => {
                        if (e.target.matches(this.inputSelector)) {
                            this.validate(e.target);
                        }
                    }, true);
                    
                    document.addEventListener('input', (e) => {
                        if (e.target.matches(this.inputSelector)) {
                            const group = e.target.closest(this.groupSelector);
                            if (group) {
                                group.classList.remove('kok-input-decorator-success', 'kok-input-decorator-required-danger', 'kok-input-decorator-type-danger', 'kok-input-decorator-regexp-danger');
                            }
                        }
                    });
                }

                validate(input) {
                    // .kok-input-group 유무 체크
                    const group = input.closest(this.groupSelector);
                    if (!group) {
                        return;
                    }

                    const isRequired = input.hasAttribute('required') || group.querySelector(this.inputSelector + '[required]');
                    const value = input.value.trim();
                    const isEmpty = value === "";
                    let isValid = true;
                    let invalidType = null;
                    
                    // 필수 값 밸리데이션
                    if (isEmpty && isRequired) {
                        isValid = false;
                        invalidType = 'REQUIRED';
                    } else {
                        const type = group.dataset.type;
                        const regexp = group.dataset.regexp;

                        if (type) {
                            if (KOK_INPUT_FILTER_TYPES[type] && KOK_INPUT_FILTER_TYPES[type].test(value)) {
                                isValid = false;
                                invalidType = 'TYPE';
                            }
                        } else if(regexp && !regexp.test(value)) {
                            isValid = false;
                            invalidType = 'REGEXP';
                        }
                    }

                    if (isValid) {
                        group.classList.add('kok-input-decorator-success');
                    } else {
                        if (invalidType === 'REQUIRED') {
                            group.classList.add('kok-input-decorator-required-danger');
                        } else if(invalidType === 'TYPE') {
                            group.classList.add('kok-input-decorator-type-danger');
                        } else if(invalidType === 'REGEXP') {
                            group.classList.add('kok-input-decorator-regexp-danger');
                        }
                    }
                }
            }
            new KokInputDecorator().init();
        </script>
