<!DOCTYPE html>
<html lang="ko">
    <head>
        <title>프로젝트명</title>

        <!-- Meta Tags -->
        <meta charset="UTF-8"/> <!-- 문자 인코딩 설정 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- 반응형 웹 설정 -->
        <meta name="format-detection" content="telephone=no"/> <!-- 전화번호 자동 감지 비활성화 -->
        <meta name="robots" content="index, follow"/> <!-- 검색 엔진 크롤링 설정 -->
        <meta name="title" content="프로젝트명"/> <!-- 제목 설정 -->
        <meta name="description" content="프로젝트설명"/> <!-- 설명 설정 -->
        <meta name="keywords" content="키워드"/> <!-- 키워드 설정 -->
        <meta name="author" content="attickok"/> <!-- 작성자 설정 -->

        <!-- Open Graph Meta Tags(SNS 공유) -->
        <meta property="og:type" content="website" /> <!-- 타입 설정 -->
        <meta property="og:title" content="프로젝트명" /> <!-- 제목 설정 -->
        <meta property="og:description" content="프로젝트설명" /> <!-- 설명 설정 -->
        <meta property="og:image" content="./assets/images/thumbnail.png" /> <!-- 이미지 설정 -->
        <meta property="og:url" content="project_url" /> <!-- URL 설정 -->

        <!-- Progressive Web App -->
        <link rel="manifest" href="/manifest.json">

        <!-- Favicon Links -->
        <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicons/favicon-16x16.png"> <!-- 16x16 파비콘 -->
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32x32.png"> <!-- 32x32 파비콘 -->
        <link rel="icon" type="image/png" sizes="64x64" href="./assets/favicons/favicon-64x64.png"> <!-- 64x64 파비콘 -->
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicons/favicon-180x180.png"> <!-- 애플 터치 아이콘 -->

        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

        <!-- CSS Stylesheet -->
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Arma75/kok-input-decorator@main/kok-input-decorator.css">
        <style>
            body {
                display: flex;
                flex-direction: column;
                gap: 40px;
            }
            header {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 12px;
            }
            main {
                display: flex;
                flex-direction: column;
                gap: 32px;
            }

            .card-layout {
                background: white;
                padding: 24px;
                border-radius: 18px;
                border: 1px solid #e9ecef;
            }
            .table-container {
                overflow: scroll;
            }
            .schema-wrapper {
                display: flex;
                flex-direction: column;
                gap: 32px;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>🚀 스프링부트의 무엇인가 생성기</h1>
            <p>스프링부트의 무엇인가를 자동으로 생성해주는 도구입니다.</p>
        </header>

        <main>
            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9]+$/">
                <label class="kok-input-label" data-required-text="필수" data-required-type="badge">팀명</label>
                <input type="text" id="teamName" class="kok-input-field" placeholder="팀명을 입력해주세요" required>
                <span class="kok-input-field-required-msg">팀명은 필수 입력 항목입니다.</span>
                <span class="kok-input-field-danger-msg">팀은 영문, 숫자만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9]+$/">
                <label class="kok-input-label" data-required-text="필수" data-required-type="badge">프로젝트명</label>
                <input type="text" id="projectName" class="kok-input-field" placeholder="프로젝트명을 입력해주세요" required>
                <span class="kok-input-field-required-msg">프로젝트명은 필수 입력 항목입니다.</span>
                <span class="kok-input-field-danger-msg">프로젝트명은 영문, 숫자만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <!-- <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9 ]+$/"> -->
            <article class="kok-input-group" data-layout="vertical">
                <label class="kok-input-label">프로젝트 설명</label>
                <input type="text" id="projectDescription" class="kok-input-field" placeholder="프로젝트 설명을 입력해주세요">
                <span class="kok-input-field-danger-msg">프로젝트 설명은 영문, 숫자, 공백만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <hr>

            <section id="schemaContainer">
            </section>

            <button id="generateButton" class="primary">생성하기</button>
        </main>

        <!-- scripts-->
        <script src="https://cdn.jsdelivr.net/gh/Arma75/kok-input-filter@main/kok-input-filter.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/Arma75/kok-input-decorator@main/kok-input-decorator.js"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>

        <script src="./templates/build-gradle.js"></script>
        <script src="./templates/settings-gradle.js"></script>
        <script src="./templates/page-request.js"></script>
        <script src="./templates/page-response.js"></script>
        <script src="./templates/excel-util.js"></script>
        <script src="./templates/global-exception-handler.js"></script>
        <script src="./templates/application.js"></script>
        <script src="./templates/save-request.js"></script>
        <script src="./templates/search-request.js"></script>
        <script src="./templates/response.js"></script>
        <script src="./templates/controller.js"></script>
        <script src="./templates/service.js"></script>
        <script src="./templates/service-impl.js"></script>
        <script src="./templates/mapper.js"></script>
        <script src="./templates/application-properties.js"></script>
        <script src="./templates/schema.js"></script>
        <script src="./templates/mapper-xml.js"></script>
        <script src="./templates/logging-aop.js"></script>

        <script src="./scripts/case-converter.js"></script>
        <script src="./scripts/kok-table-decorator.js"></script>
        <script src="./scripts/kok-schema.js"></script>

        <script>
            // const schema = new Schema();
            const PROJECT_INFO_LOCAL_STORAGE_KEY = 'vkdnjfpdlswj';

            new KokInputDecorator().init();
            
            new KokInputFilter("#teamName", { regexp: /[^a-zA-Z0-9]/g, required: true });
            new KokInputFilter("#projectName", { regexp: /[^a-zA-Z0-9]/g, required: true });
            // new KokInputFilter("#projectDescription", { regexp: /[^a-zA-Z0-9 ]/g });
            new KokInputFilter("#tableName", { regexp: /[^a-zA-Z0-9_]/g, required: true });
            // new KokInputFilter("#tableDescription", { regexp: /[^a-zA-Z0-9 ]/g });

            function saveProjectInfo() {
                const data = {
                    teamName: document.querySelector('#teamName').value,
                    projectName: document.querySelector('#projectName').value,
                    projectDescription: document.querySelector('#projectDescription').value,
                    schemaJson: schema.toJSON()
                };
                console.log(data);
                localStorage.setItem(PROJECT_INFO_LOCAL_STORAGE_KEY, JSON.stringify(data));
            }

            function loadProjectInfo() {
                const savedData = localStorage.getItem(PROJECT_INFO_LOCAL_STORAGE_KEY);
                if (!savedData) {
                    return null;
                }

                try {
                    const data = JSON.parse(savedData);
                    
                    document.querySelector('#teamName').value = data.teamName || '';
                    document.querySelector('#projectName').value = data.projectName || '';
                    document.querySelector('#projectDescription').value = data.projectDescription || '';

                    const restoredSchema = new Schema({
                        name: data.schemaJson.name,
                        comment: data.schemaJson.comment
                    });

                    if (data.schemaJson.columns) {
                        data.schemaJson.columns.forEach(colData => {
                            restoredSchema.addColumn(colData);
                        });
                    }

                    return restoredSchema;
                } catch (e) {
                    console.error("데이터 복원 중 오류 발생:", e);
                    return null;
                }
            }

            const savedSchema = loadProjectInfo();
            let schema = savedSchema || new Schema();
            let schemaComponent = new SchemaComponent(schema);
            document.querySelector("#schemaContainer").appendChild(schemaComponent.element);


            const kokTableDecorator = new KokTableDecorator('.kok-table');
            const teamNameElem = document.querySelector("#teamName");
            const projectNameElem = document.querySelector("#projectName");
            const projectDescriptionElem = document.querySelector("#projectDescription");
            const tableNameElem = document.querySelector("[name=tableName]");
            const tableDescriptionElem = document.querySelector("[name=tableDescription]");

            // 파일 내용 읽기
            async function readFile(filePath) {
                try {
                    const response = await fetch(filePath);
                    if (!response.ok) {
                        throw new Error('파일을 찾을 수 없습니다. 경로를 확인해주세요.');
                    }

                    return await response.arrayBuffer();
                } catch (error) {
                    console.error("❌ error::", error);
                    return null;
                }
            }

            // 핸들바 템플릿을 이용하여 파일 내용 생성
            function createContentsByTemplate(template, data) {
                const handlebar = Handlebars.compile(template);
                return handlebar(data);
            }

            function validate() {
                const teamName = toCamelCase(teamNameElem.value).toLowerCase();
                const projectName = toCamelCase(projectNameElem.value).toLowerCase();
                const projectDescription = projectDescriptionElem.value;
                const tableName = toCamelCase(schema.name).toLowerCase();
                const tableDescription = schema.comment;

                // 필수 값 체크
                if (teamName == '') {
                    teamNameElem.focus();
                    return false;
                } else if (projectName == '') {
                    projectNameElem.focus();
                    return false;
                } else if (tableName == '') {
                    tableNameElem.focus();
                    return false;
                }

                if (schema.columns.length == 0) {
                    tableNameElem.focus();
                    alert('컬럼을 작성해주세요.');
                    return false;
                }

                if (schema.columns.filter(c => c.pk).length !== 1) {
                    tableNameElem.focus();
                    alert('PK 컬럼은 1개 사용해야합니다.');
                    return false;
                }

                if (schema.columns.filter(c => c.type === 'LOGICAL_USE').length > 1 ||
                    schema.columns.filter(c => c.type === 'CREATE_TIMESTAMP').length > 1 ||
                    schema.columns.filter(c => c.type === 'UPDATE_TIMESTAMP').length > 1) {
                    tableNameElem.focus();
                    alert('논리적 타입은 각각 1개씩 사용해야합니다.');
                    return false;
                }

                const columnNameSet = new Set();
                for (let i = 0; i < schema.columns.length; i++) {
                    if (schema.columns[i].name == '') {
                        document.querySelectorAll('[name="name"]')[i].focus();
                        alert('컬럼명을 작성해주세요.');
                        return false;
                    }
                    if (columnNameSet.has(toCamelCase(schema.columns[i].name))) {
                        document.querySelectorAll('[name="name"]')[i].focus();
                        alert('중복된 컬럼명이 존재합니다.');
                        return false;
                    }

                    columnNameSet.add(toCamelCase(schema.columns[i].name));
                }


                return true;
            }

            function createTemplateData() {
                const data = {};
                data.today = new Date().toISOString().split('T')[0];
                
                data.teamName = toCamelCase(teamNameElem.value).toLowerCase();
                
                data.projectName = toCamelCase(projectNameElem.value).toLowerCase();
                data.projectPascalName = toPascalCase(projectNameElem.value);
                data.projectDescription = projectDescriptionElem.value;

                data.tableName = toCamelCase(tableNameElem.value).toLowerCase();
                data.tableScreamingSnakeName = toScreamingSnakeCase(tableNameElem.value);
                data.tableCamelName = toCamelCase(tableNameElem.value);
                data.tablePascalName = toPascalCase(tableNameElem.value);
                data.tableDescription = tableDescriptionElem.value;

                data.columns = schema.columns.map(c => {
                    const newColumn = new Column({...c});
                    newColumn.isCreateTimestamp = c.type === 'CREATE_TIMESTAMP';
                    newColumn.isUpdateTimestamp = c.type === 'UPDATE_TIMESTAMP';
                    newColumn.isString = c.getJavaType() === 'String';
                    newColumn.isLocalDateTime = c.getJavaType() === 'LocalDateTime';
                    newColumn.dbType = Column.TYPES[c.type].dbType;
                    newColumn.javaType = c.getJavaType();
                    newColumn.fieldName = toCamelCase(c.name);
                    newColumn.fieldPascalName = toPascalCase(c.name);
                    newColumn.name = toSnakeCase(c.name).toUpperCase();
                    newColumn.hasDefaultValue = c.defaultValue != null && c.defaultValue != '';

                    return newColumn;
                });
                data.searchColumns = [...data.columns];
                data.columns.forEach(c => {
                    if (c.isLocalDateTime) {
                        const startDateColumn = new Column({...c});
                        startDateColumn.isCreateTimestamp = false;
                        startDateColumn.isUpdateTimestamp = false;
                        startDateColumn.isString = c.isString;
                        startDateColumn.isLocalDateTime = c.isLocalDateTime;
                        startDateColumn.javaType = c.javaType;
                        startDateColumn.fieldName = c.fieldName + 'Start';
                        startDateColumn.fieldPascalName = c.fieldPascalName + 'Start';
                        startDateColumn.name += '_START';
                        startDateColumn.comment = (c.comment || c.name) + ' 시작일';
                        data.searchColumns.push(startDateColumn);

                        const endDateColumn = new Column({...c});
                        endDateColumn.isCreateTimestamp = false;
                        endDateColumn.isUpdateTimestamp = false;
                        endDateColumn.isString = c.isString;
                        endDateColumn.isLocalDateTime = c.isLocalDateTime;
                        endDateColumn.javaType = c.javaType;
                        endDateColumn.fieldName = c.fieldName + 'End';
                        endDateColumn.fieldPascalName = c.fieldPascalName + 'End';
                        endDateColumn.name += '_END';
                        endDateColumn.comment = (c.comment || c.name) + ' 종료일';
                        data.searchColumns.push(endDateColumn);
                    }
                });
                data.updateColumns = data.columns.filter(c => !c.isCreateTimestamp && !c.pk);
                data.requestColumns = data.columns.filter(c => !c.isCreateTimestamp && !c.isUpdateTimestamp);
                data.searchColumns = data.searchColumns.filter(c => !c.isCreateTimestamp && !c.isUpdateTimestamp && !c.pk);
                data.findAllConditionColumns = data.columns.filter(c => !c.pk);

                data.columnsWithoutAutoIncrement = data.columns.filter(c => !c.autoIncrement);

                data.pkColumns = data.columns.filter(c => c.pk);
                data.isSinglePk = data.pkColumns.length === 1;

                data.requestImportList = [...new Set(data.requestColumns.reduce((a, b) => a.concat(b.getJavaTypeImport()), []).filter(s => s))];
                data.importList = [...new Set(schema.columns.reduce((a, b) => a.concat(b.getJavaTypeImport()), []).filter(s => s))];
                data.pkColumnImportList = [...new Set(data.pkColumns.reduce((a, b) => a.concat(b.getJavaTypeImport()), []).filter(s => s))];

                data.hasLogicalUseColumn = data.columns.filter(c => c.type === 'LOGICAL_USE').length > 0;
                data.hasCreateTimeStampColumn = data.columns.filter(c => c.type === 'CREATE_TIMESTAMP').length > 0;
                data.hasUpdateTimeStampColumn = data.columns.filter(c => c.type === 'UPDATE_TIMESTAMP').length > 0;

                data.logicalUseColumn = data.columns.filter(c => c.type === 'LOGICAL_USE')[0];
                data.createTimeStampColumn = data.columns.filter(c => c.type === 'CREATE_TIMESTAMP')[0];
                data.updateTimeStampColumn = data.columns.filter(c => c.type === 'UPDATE_TIMESTAMP')[0];
                
                return data;
            }

            // 스프링부트 폴더 생성
            async function createSpringBootProject() {
                const zip = new JSZip();

                if (!validate()) {
                    return;
                }

                const templateData = createTemplateData();
                console.log(templateData);

                zip.file(`${templateData.projectName}/gradlew`, readFile('./assets/files/gradlew'));
                zip.file(`${templateData.projectName}/gradlew.bat`, readFile('./assets/files/gradlew.bat'));
                zip.file(`${templateData.projectName}/gradle/wrapper/gradle-wrapper.jar`, readFile('./assets/files/gradle-wrapper.jar'));
                zip.file(`${templateData.projectName}/gradle/wrapper/gradle-wrapper.properties`, readFile('./assets/files/gradle-wrapper.properties'));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.projectPascalName}Application.java`, createContentsByTemplate(APPLICATION_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/build.gradle`, createContentsByTemplate(BUILD_GRADLE_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/settings.gradle`, createContentsByTemplate(SETTINGS_GRADLE_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/common/dto/PageRequest.java`, createContentsByTemplate(PAGE_REQUEST_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/common/dto/PageResponse.java`, createContentsByTemplate(PAGE_RESPONSE_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/common/utils/ExcelUtil.java`, createContentsByTemplate(EXCEL_UTIL_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/common/exception/GlobalExceptionHandler.java`, createContentsByTemplate(GLOBAL_EXCEPTION_HANDLER_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/aop/ApiLoggingAspect.java`, createContentsByTemplate(LOGGING_AOP_TEMPLATE, templateData));

                // console.log(createContentsByTemplate(SAVE_REQUEST_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/dto/${templateData.tablePascalName}SaveRequest.java`, createContentsByTemplate(SAVE_REQUEST_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/dto/${templateData.tablePascalName}SearchRequest.java`, createContentsByTemplate(SEARCH_REQUEST_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/dto/${templateData.tablePascalName}Response.java`, createContentsByTemplate(RESPONSE_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/controller/${templateData.tablePascalName}Controller.java`, createContentsByTemplate(CONTROLLER_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/service/${templateData.tablePascalName}Service.java`, createContentsByTemplate(SERVICE_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/service/${templateData.tablePascalName}ServiceImpl.java`, createContentsByTemplate(SERVICE_IMPL_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/mapper/${templateData.tablePascalName}Mapper.java`, createContentsByTemplate(MAPPER_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/java/com/${templateData.teamName}/${templateData.projectName}/${templateData.tableName}/mapper/${templateData.tablePascalName}Mapper.java`, createContentsByTemplate(MAPPER_TEMPLATE, templateData));

                zip.file(`${templateData.projectName}/src/main/resources/application.properties`, createContentsByTemplate(APPLICATION_PROPERTIES_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/resources/schema.sql`, createContentsByTemplate(SCHEMA_TEMPLATE, templateData));
                zip.file(`${templateData.projectName}/src/main/resources/mapper/${templateData.tableName}/${templateData.tablePascalName}Mapper.xml`, createContentsByTemplate(MAPPER_XML_TEMPLATE, templateData));

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `${templateData.projectName}.zip`;
                link.click();
            }

            generateButton.addEventListener('click', createSpringBootProject);

            document.addEventListener('input', e => {
                saveProjectInfo();
            });
            document.addEventListener('change', e => {
                saveProjectInfo();
            });
            document.addEventListener('click', e => {
                saveProjectInfo();
            });
        </script>
    </body>
</html>
