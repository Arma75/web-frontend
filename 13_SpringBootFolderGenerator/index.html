<!DOCTYPE html>
<html lang="ko">
    <head>
        <title>프로젝트명</title>

        <!-- Meta Tags -->
        <meta charset="UTF-8"/> <!-- 문자 인코딩 설정 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- 반응형 웹 설정 -->
        <meta name="format-detection" content="telephone=no"/> <!-- 전화번호 자동 감지 비활성화 -->
        <meta name="robots" content="index, follow"/> <!-- 검색 엔진 크롤링 설정 -->
        <meta name="title" content="프로젝트명"/> <!-- 제목 설정 -->
        <meta name="description" content="프로젝트설명"/> <!-- 설명 설정 -->
        <meta name="keywords" content="키워드"/> <!-- 키워드 설정 -->
        <meta name="author" content="attickok"/> <!-- 작성자 설정 -->

        <!-- Open Graph Meta Tags(SNS 공유) -->
        <meta property="og:type" content="website" /> <!-- 타입 설정 -->
        <meta property="og:title" content="프로젝트명" /> <!-- 제목 설정 -->
        <meta property="og:description" content="프로젝트설명" /> <!-- 설명 설정 -->
        <meta property="og:image" content="./assets/images/thumbnail.png" /> <!-- 이미지 설정 -->
        <meta property="og:url" content="project_url" /> <!-- URL 설정 -->

        <!-- Progressive Web App -->
        <link rel="manifest" href="/manifest.json">

        <!-- Favicon Links -->
        <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicons/favicon-16x16.png"> <!-- 16x16 파비콘 -->
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32x32.png"> <!-- 32x32 파비콘 -->
        <link rel="icon" type="image/png" sizes="64x64" href="./assets/favicons/favicon-64x64.png"> <!-- 64x64 파비콘 -->
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicons/favicon-180x180.png"> <!-- 애플 터치 아이콘 -->

        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

        <!-- CSS Stylesheet -->
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Arma75/kok-input-decorator@main/kok-input-decorator.css">
        <style>
            body {
                display: flex;
                flex-direction: column;
                gap: 40px;
            }
            header {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 12px;
            }
            main {
                display: flex;
                flex-direction: column;
                gap: 32px;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>🚀 스프링부트 프로젝트 생성기</h1>
            <p>스프링부트 프로젝트 구조를 자동으로 생성해주는 도구입니다.</p>
        </header>

        <main>
            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9]+$/">
                <label class="kok-input-label" data-required-text="필수" data-required-type="badge">팀명</label>
                <input type="text" id="teamName" class="kok-input-field" placeholder="팀명을 입력해주세요" required>
                <span class="kok-input-field-required-msg">팀명은 필수 입력 항목입니다.</span>
                <span class="kok-input-field-danger-msg">팀은 영문, 숫자만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9]+$/">
                <label class="kok-input-label" data-required-text="필수" data-required-type="badge">프로젝트명</label>
                <input type="text" id="projectName" class="kok-input-field" placeholder="프로젝트명을 입력해주세요" required>
                <span class="kok-input-field-required-msg">프로젝트명은 필수 입력 항목입니다.</span>
                <span class="kok-input-field-danger-msg">프로젝트명은 영문, 숫자만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9 ]+$/">
                <label class="kok-input-label">프로젝트 설명</label>
                <input type="text" id="projectDescription" class="kok-input-field" placeholder="프로젝트 설명을 입력해주세요">
                <span class="kok-input-field-danger-msg">프로젝트 설명은 영문, 숫자, 공백만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <hr>

            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9]+$/">
                <label class="kok-input-label" data-required-text="필수" data-required-type="badge">테이블명</label>
                <input type="text" id="tableName" class="kok-input-field" placeholder="테이블명을 입력해주세요" required>
                <span class="kok-input-field-required-msg">테이블명은 필수 입력 항목입니다.</span>
                <span class="kok-input-field-danger-msg">테이블명은 영문, 숫자만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <article class="kok-input-group" data-layout="vertical" data-regexp="/^[a-zA-Z0-9 ]+$/">
                <label class="kok-input-label">테이블 설명</label>
                <input type="text" id="tableDescription" class="kok-input-field" placeholder="테이블 설명을 입력해주세요">
                <span class="kok-input-field-danger-msg">테이블 설명은 영문, 숫자, 공백만 입력 가능합니다.</span>
                <span class="kok-input-field-success-msg">좋습니다!</span>
            </article>

            <button id="generateButton" class="primary">생성하기</button>
        </main>

        <!-- scripts-->
        <script src="https://cdn.jsdelivr.net/gh/Arma75/kok-input-filter@main/kok-input-filter.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/Arma75/kok-input-decorator@main/kok-input-decorator.js"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>

        <script src="./scripts/case-converter.js"></script>
        <script src="./templates/test-class-template.js"></script>

        <script>
            const PROJECT_INFO_LOCAL_STORAGE_KEY = 'vkdnjfpdlswj';
            const teamNameElem = document.querySelector("#teamName");
            const projectNameElem = document.querySelector("#projectName");
            const projectDescriptionElem = document.querySelector("#projectDescription");
            const tableNameElem = document.querySelector("#tableName");
            const tableDescriptionElem = document.querySelector("#tableDescription");

            new KokInputDecorator().init();
            
            new KokInputFilter("#teamName", { regexp: /[^a-zA-Z0-9]/g, required: true });
            new KokInputFilter("#projectName", { regexp: /[^a-zA-Z0-9]/g, required: true });
            new KokInputFilter("#projectDescription", { regexp: /[^a-zA-Z0-9 ]/g });
            new KokInputFilter("#tableName", { regexp: /[^a-zA-Z0-9]/g, required: true });
            new KokInputFilter("#tableDescription", { regexp: /[^a-zA-Z0-9 ]/g });

            window.onload = _ => {
                readProjectInfo();
            };

            // 파일 내용 읽기
            async function readFile(filePath) {
                try {
                    const response = await fetch(filePath);
                    if (!response.ok) {
                        throw new Error('파일을 찾을 수 없습니다. 경로를 확인해주세요.');
                    }

                    return await response.arrayBuffer();
                } catch (error) {
                    console.error("❌ error::", error);
                    return null;
                }
            }

            // generate 정보 읽기
            function readProjectInfo() {
                const localStorageItem = localStorage.getItem(PROJECT_INFO_LOCAL_STORAGE_KEY);
                if (!localStorageItem) {
                    return;
                }

                const projectInfo = JSON.parse(localStorageItem);
                teamNameElem.value = projectInfo.teamName;
                projectNameElem.value = projectInfo.projectName;
                projectDescriptionElem.value = projectInfo.projectDescription;
                tableNameElem.value = projectInfo.tableName;
                tableDescriptionElem.value = projectInfo.tableDescription;
            }

            // generate 정보 저장
            function saveProjectInfo() {
                const teamName = teamNameElem.value;
                const projectName = projectNameElem.value;
                const projectDescription = projectDescriptionElem.value;
                const tableName = tableNameElem.value;
                const tableDescription = tableDescriptionElem.value;

                const infoJson = JSON.stringify({
                    teamName, projectName, projectDescription, tableName, tableDescription
                });

                localStorage.setItem(PROJECT_INFO_LOCAL_STORAGE_KEY, infoJson);
            }

            // 핸들바 템플릿을 이용하여 파일 내용 생성
            function createContentsByTemplate(template, data) {
                const handlebar = Handlebars.compile(template);
                return handlebar(data);
            }

            // 스프링부트 폴더 생성
            async function createSpringBootProject() {
                const zip = new JSZip();

                const teamName = toCamelCase(teamNameElem.value).toLowerCase();
                const projectName = toCamelCase(projectNameElem.value).toLowerCase();
                const projectDescription = projectDescriptionElem.value;
                const tableName = toCamelCase(tableNameElem.value).toLowerCase();
                const tableDescription = tableDescriptionElem.value;

                // 필수 값 체크
                if (teamName == '') {
                    teamNameElem.focus();
                    return;
                } else if (projectName == '') {
                    projectNameElem.focus();
                    return;
                } else if (tableName == '') {
                    tableNameElem.focus();
                    return;
                }

                // generate 정보 저장
                saveProjectInfo();

                zip.file(`${projectName}/gradlew`, readFile('./assets/files/gradlew'));
                zip.file(`${projectName}/gradlew.bat`, readFile('./assets/files/gradlew.bat'));
                zip.file(`${projectName}/gradle/wrapper/gradle-wrapper.jar`, readFile('./assets/files/gradle-wrapper.jar'));
                zip.file(`${projectName}/gradle/wrapper/gradle-wrapper.properties`, readFile('./assets/files/gradle-wrapper.properties'));

                let className = `${toPascalCase(projectNameElem.value)}Application`;
                zip.file(`${projectName}/src/main/java/com/${teamName}/${projectName}/${className}.java`, createContentsByTemplate(TEST_CLASS_TEMPLATE, {className}));

                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/common/dto`);
                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/common/exception`);
                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/common/utils`);

                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/${tableName}/controller`);
                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/${tableName}/service`);
                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/${tableName}/dao`);
                zip.folder(`${projectName}/src/main/java/com/${teamName}/${projectName}/${tableName}/dto`);

                zip.folder(`${projectName}/src/main/resources`);


                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `${projectName}.zip`;
                link.click();
            }

            generateButton.addEventListener('click', createSpringBootProject);
        </script>
    </body>
</html>
