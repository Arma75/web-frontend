<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Studio - Touch Fixed</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #007bff;
            --border: #333;
            --danger: #ff4d4d;
            --success: #28a745;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 모바일에서 당겨서 새로고침 방지 */
            overscroll-behavior-y: contain; 
            overflow: hidden;
        }

        header { 
            width: 100%; 
            padding: 10px 0; 
            text-align: center; 
            background: var(--panel-bg); 
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .top-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 12px;
            width: 100%;
        }

        .bottom-toolbar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px;
            width: 100%;
            max-width: 500px;
            background: #1a1a1a;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }

        .color-picker-wrapper {
            position: relative;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 2px solid #555;
            overflow: hidden;
        }
        
        input[type="color"] {
            position: absolute;
            top: -10px; left: -10px;
            width: 60px; height: 60px;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        select {
            background: #2a2a2a;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        .tool-btn {
            background: #2a2a2a;
            color: white;
            border: 1px solid var(--border);
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.active { background: var(--accent); border-color: #fff; }
        .tool-btn.clear { color: var(--danger); }
        .tool-btn.download { background: var(--success); border: none; font-weight: bold; }

        .main-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
            touch-action: none; /* 브라우저 기본 제스처 차단 (중요) */
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            background-color: #000;
            border: 1px solid #444;
            line-height: 0;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #grid-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.15) 1px, transparent 1px);
        }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size: 1rem; letter-spacing: 1px;">PIXEL STUDIO</h2>
</header>

<div class="top-controls">
    <div class="control-group">
        <label>Size</label>
        <select id="gridSize">
            <option value="8">8x8</option>
            <option value="16" selected>16x16</option>
            <option value="32">32x32</option>
            <option value="64">64x64</option>
        </select>
    </div>
    <div class="control-group">
        <label>Pen</label>
        <div class="color-picker-wrapper"><input type="color" id="paintColor" value="#ff0000"></div>
    </div>
    <div class="control-group">
        <label>BG</label>
        <div class="color-picker-wrapper"><input type="color" id="bgColor" value="#1e1e1e"></div>
    </div>
</div>

<div class="main-stage">
    <div class="canvas-container" id="container">
        <canvas id="pixelCanvas"></canvas>
        <div id="grid-overlay"></div>
    </div>
</div>

<div class="bottom-toolbar">
    <button id="btnPencil" class="tool-btn active"><span>✏️</span><span>연필</span></button>
    <button id="btnEraser" class="tool-btn"><span>🧼</span><span>지우개</span></button>
    <button id="btnClear" class="tool-btn clear"><span>🗑️</span><span>클리어</span></button>
    <button id="btnDownload" class="tool-btn download"><span>💾</span><span>저장</span></button>
</div>

<script>
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const gridOverlay = document.getElementById('grid-overlay');
    const gridSizeSelect = document.getElementById('gridSize');
    const paintColorInput = document.getElementById('paintColor');
    const bgColorInput = document.getElementById('bgColor');
    
    const btnPencil = document.getElementById('btnPencil');
    const btnEraser = document.getElementById('btnEraser');
    const btnClear = document.getElementById('btnClear');
    const btnDownload = document.getElementById('btnDownload');

    let size = 16;
    let pixelData = [];
    let isDrawing = false;
    let mode = 'pencil';

    function init() {
        size = parseInt(gridSizeSelect.value);
        const availW = window.innerWidth * 0.95;
        const availH = window.innerHeight - 220;
        const finalSize = Math.min(availW, availH, 512);

        canvas.width = size;
        canvas.height = size;
        canvas.style.width = `${finalSize}px`;
        canvas.style.height = `${finalSize}px`;
        
        gridOverlay.style.backgroundSize = `${100/size}% ${100/size}%`;
        pixelData = Array(size).fill().map(() => Array(size).fill(null));
        render();
    }

    function render() {
        ctx.fillStyle = bgColorInput.value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                if (pixelData[y][x]) {
                    ctx.fillStyle = pixelData[y][x];
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        }
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        let cx, cy;
        // 터치 이벤트 대응 개선
        if (e.touches && e.touches.length > 0) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
            cx = e.changedTouches[0].clientX;
            cy = e.changedTouches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        const x = Math.floor((cx - rect.left) / (rect.width / size));
        const y = Math.floor((cy - rect.top) / (rect.height / size));
        return { x, y };
    }

    function handleAction(e) {
        if (!isDrawing) return;
        const { x, y } = getCoords(e);
        if (x >= 0 && x < size && y >= 0 && y < size) {
            pixelData[y][x] = (mode === 'pencil') ? paintColorInput.value : null;
            render();
        }
        // 드래그 시 브라우저 스크롤 방지
        if (e.cancelable) e.preventDefault();
    }

    paintColorInput.oninput = render;
    bgColorInput.oninput = render;

    // 마우스 이벤트
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleAction(e); });
    window.addEventListener('mousemove', handleAction);
    window.addEventListener('mouseup', () => isDrawing = false);

    // 터치 이벤트 (Passive: false 설정이 핵심)
    canvas.addEventListener('touchstart', (e) => {
        isDrawing = true;
        handleAction(e);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        handleAction(e);
    }, { passive: false });

    window.addEventListener('touchend', () => {
        isDrawing = false;
    });

    // 버튼 로직
    btnPencil.onclick = () => { mode = 'pencil'; btnPencil.className = 'tool-btn active'; btnEraser.className = 'tool-btn'; };
    btnEraser.onclick = () => { mode = 'eraser'; btnEraser.className = 'tool-btn active'; btnPencil.className = 'tool-btn'; };
    btnClear.onclick = () => { if(confirm("초기화 하시겠습니까?")) init(); };
    gridSizeSelect.onchange = () => { if(confirm("변경 시 작업이 삭제됩니다.")) init(); else gridSizeSelect.value = size; };

    btnDownload.onclick = () => {
        const temp = document.createElement('canvas');
        temp.width = size; temp.height = size;
        const tCtx = temp.getContext('2d');
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                if (pixelData[y][x]) {
                    tCtx.fillStyle = pixelData[y][x];
                    tCtx.fillRect(x, y, 1, 1);
                }
            }
        }
        const link = document.createElement('a');
        link.download = 'pixel-art.png';
        link.href = temp.toDataURL();
        link.click();
    };

    window.addEventListener('resize', init);
    init();
</script>

</body>
</html>
